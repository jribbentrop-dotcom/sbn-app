server {
    listen 80;
    listen [::]:80;
    server_name soulbossanova.com www.soulbossanova.com;

    # Redirect to HTTPS once SSL is set up (uncomment after certbot)
    # return 301 https://$host$request_uri;

    root /var/www/sbn-app/public;
    index index.php;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Static assets — long cache
    location ~* \.(css|js|woff2?|ttf|eot|svg|png|jpg|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php-fpm/www.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Block direct access to storage/bootstrap
    location ~ ^/(storage|bootstrap/cache) {
        deny all;
    }

    client_max_body_size 20M;

    access_log /var/log/nginx/sbn-access.log;
    error_log  /var/log/nginx/sbn-error.log;
}

